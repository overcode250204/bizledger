# ─────────────────────────────────────────────────────────────────────────
# BizLedger — Identity Service Configuration
# Managed by Config Server (config-server:8888)
# ─────────────────────────────────────────────────────────────────────────

server:
    port: 8081

spring:
    kafka:
        bootstrap-servers: localhost:29092
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.apache.kafka.common.serialization.StringSerializer
    datasource:
        url: jdbc:postgresql://localhost:5432/identity_db
        username: bizledger
        password: bizledger_password
        hikari:
            connection-timeout: 30000
            maximum-pool-size: 10
            minimum-idle: 2
            pool-name: IdentityHikariPool
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: false
        properties:
            hibernate:
                format_sql: true
                use_sql_comments: true
                dialect: org.hibernate.dialect.PostgreSQLDialect
                ddl-auto: validate
            show-sql: true
        database-platform: org.hibernate.dialect.PostgreSQLDialect
    flyway:
        enabled: true
        locations: classpath:migration

bizledger:
    jwt:
        secret: c3VwZXItc2VjcmV0LWtleS1tdXN0LWJlLWF0LWxlYXN0LTI1Ni1iaXRzLWxvbmctZm9yLXNlY3VyaXR5
        issuer: bizledger
        access-token-expiration-minutes: 60
        refresh-token-expiration-days: 7
