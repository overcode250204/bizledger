server:
    port: 8080

spring:
    application:
        name: api-gateway-service
    config:
        import: "optional:configserver:http://localhost:8888"  # pulls config from config-server; optional = still starts if server is offline
    cloud:
        config:
            fail-fast: false     # dev: don't crash if config-server is unavailable
        gateway:
            routes:
                # ── Public Auth (no JWT required) ──
                - id: identity-auth-public
                  uri: lb://identity-service-java
                  predicates:
                      - Path=/api/v1/auth/register-tenant,/api/v1/auth/login,/api/v1/auth/refresh-token

                # ── Protected Identity routes ──
                - id: identity-route
                  uri: lb://identity-service-java
                  predicates:
                      - Path=/api/v1/auth/**,/api/v1/users/**,/api/v1/roles/**
                  filters:
                      - AuthenticationFilter
                      - name: RequestRateLimiter
                        args:
                            redis-rate-limiter.replenishRate: 10
                            redis-rate-limiter.burstCapacity: 20
                            key-resolver: "#{@userKeyResolver}"

                # ── Catalog ──
                - id: catalog-route
                  uri: lb://catalog-service-java
                  predicates:
                      - Path=/api/v1/products/**,/api/v1/categories/**
                  filters:
                      - AuthenticationFilter
                      - name: RequestRateLimiter
                        args:
                            redis-rate-limiter.replenishRate: 10
                            redis-rate-limiter.burstCapacity: 20
                            key-resolver: "#{@userKeyResolver}"

                # ── Inventory ──
                - id: inventory-route
                  uri: lb://inventory-service-java
                  predicates:
                      - Path=/api/v1/inventory/**
                  filters:
                      - AuthenticationFilter
                      - name: RequestRateLimiter
                        args:
                            redis-rate-limiter.replenishRate: 10
                            redis-rate-limiter.burstCapacity: 20
                            key-resolver: "#{@userKeyResolver}"

                # ── Orders ──
                - id: order-route
                  uri: lb://order-service-java
                  predicates:
                      - Path=/api/v1/orders/**
                  filters:
                      - AuthenticationFilter
                      - name: RequestRateLimiter
                        args:
                            redis-rate-limiter.replenishRate: 10
                            redis-rate-limiter.burstCapacity: 20
                            key-resolver: "#{@userKeyResolver}"

                # ── Payments & Invoices ──
                - id: payment-route
                  uri: lb://payment-service-java
                  predicates:
                      - Path=/api/v1/payments/**,/api/v1/invoices/**
                  filters:
                      - AuthenticationFilter
                      - name: RequestRateLimiter
                        args:
                            redis-rate-limiter.replenishRate: 10
                            redis-rate-limiter.burstCapacity: 20
                            key-resolver: "#{@userKeyResolver}"

                # ── Audit ──
                - id: audit-route
                  uri: lb://audit-service-java
                  predicates:
                      - Path=/api/v1/audit-logs/**
                  filters:
                      - AuthenticationFilter

                # ── Notifications (SignalR WebSocket + REST) ──
                - id: notification-route
                  uri: lb://notification-service-dotnet
                  predicates:
                      - Path=/api/v1/notifications/**,/hubs/**

                # ── Reporting ──
                - id: reporting-route
                  uri: lb://reporting-service-dotnet
                  predicates:
                      - Path=/api/v1/reports/**
                  filters:
                      - AuthenticationFilter
    data:
        redis:
            host: localhost
            port: 6379

# Eureka client registration
eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        register-with-eureka: true
        fetch-registry: true
    instance:
        prefer-ip-address: true
        lease-renewal-interval-in-seconds: 10

# JWT secret (local fallback when config-server is offline)
jwt:
    secret: c3VwZXItc2VjcmV0LWtleS1tdXN0LWJlLWF0LWxlYXN0LTI1Ni1iaXRzLWxvbmctZm9yLXNlY3VyaXR5

# Actuator + observability
management:
    tracing:
        sampling:
            probability: 1.0
    endpoints:
        web:
            exposure:
                include: health,info,metrics,prometheus
    endpoint:
        health:
            show-details: always