services:
  postgres:
    image: postgres:15
    container_name: bizledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - bizledger_postgres_data:/var/lib/postgresql/data
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bizledger-net

  redis:
    image: redis:7.2-alpine
    container_name: bizledger-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - bizledger_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bizledger-net

  kafka:
    image: apache/kafka:3.7.2
    container_name: bizledger-kafka
    hostname: bizledger-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_EXTERNAL_PORT}:9092"
    environment:
      # ===============================
      # Kafka KRaft mode - no ZooKeeper
      # ===============================
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@bizledger-kafka:29093

      # ===============================
      # Listeners
      # - PLAINTEXT: for containers inside Docker network
      # - PLAINTEXT_HOST: for apps running on host machine
      # - CONTROLLER: for KRaft controller
      # ===============================
      KAFKA_LISTENERS: PLAINTEXT://:19092,PLAINTEXT_HOST://:9092,CONTROLLER://:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://bizledger-kafka:19092,PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # ===============================
      # Single-node local dev configs
      # ===============================
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - bizledger_kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:19092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      - bizledger-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bizledger-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: bizledger-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: bizledger-kafka:19092
    networks:
      - bizledger-net

  kafka-topic-init:
    image: apache/kafka:3.7.2
    container_name: bizledger-kafka-topic-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      sh -c "
      echo 'Waiting for Kafka...' &&

      /opt/kafka/bin/kafka-topics.sh --bootstrap-server bizledger-kafka:19092 --list >/dev/null 2>&1 &&

      echo 'Creating Kafka topics...' &&

      /opt/kafka/bin/kafka-topics.sh --bootstrap-server bizledger-kafka:19092 --create --if-not-exists --topic identity.events --partitions 1 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server bizledger-kafka:19092 --create --if-not-exists --topic catalog.events --partitions 1 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server bizledger-kafka:19092 --create --if-not-exists --topic inventory.events --partitions 1 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server bizledger-kafka:19092 --create --if-not-exists --topic order.events --partitions 1 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server bizledger-kafka:19092 --create --if-not-exists --topic payment.events --partitions 1 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server bizledger-kafka:19092 --create --if-not-exists --topic audit.events --partitions 1 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server bizledger-kafka:19092 --create --if-not-exists --topic notification.events --partitions 1 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server bizledger-kafka:19092 --create --if-not-exists --topic reporting.events --partitions 1 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server bizledger-kafka:19092 --create --if-not-exists --topic dead-letter.events --partitions 1 --replication-factor 1 &&

      echo 'Kafka topics created successfully.'
      "
    networks:
      - bizledger-net

