  zipkin:
    image: openzipkin/zipkin:3
    container_name: bizledger-zipkin
    ports:
      - "9411:9411"
    networks:
      - bizledger-net

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: bizledger-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - bizledger_prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - bizledger-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: bizledger-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - bizledger_grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - bizledger-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: bizledger-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - bizledger_es_data:/usr/share/elasticsearch/data
    networks:
      - bizledger-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: bizledger-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - bizledger-net

volumes:
  bizledger_postgres_data:
  bizledger_redis_data:
  bizledger_kafka_data:
  bizledger_prometheus_data:
  bizledger_grafana_data:
  bizledger_es_data:

networks:
  bizledger-net:
    name: bizledger-net
    driver: bridge